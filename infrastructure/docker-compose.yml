services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      auth-api:
        condition: service_healthy
      todo-api:
        condition: service_healthy
      files-api:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    networks:
      - backend-net

  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - auth_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTH_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  todo-db:
    image: postgres:15-alpine
    container_name: todo-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - todo_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${TODO_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  files-db:
    image: postgres:15-alpine
    container_name: files-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - files_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${FILES_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-I", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    build:
      context: ./zookeeper
      dockerfile: Dockerfile
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-api
    environment:
      PYTHONPATH: /app:/app/../services
    command: >
      sh -c "poetry run alembic upgrade heads &&
             poetry run uvicorn main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-worker:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-worker
    environment:
      PYTHONPATH: /app:/app/../services
    command: poetry run celery -A tasks worker --loglevel=info -Q auth_queue
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-api:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-api
    command: >
      sh -c "poetry run python manage.py collectstatic --noinput &&
             chown -R 101:101 /app/staticfiles &&
             poetry run python manage.py migrate &&
             poetry run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../services/TODO-core:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

  todo-worker:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-worker
    command: poetry run celery -A settings.celery worker --loglevel=info -Q todo_queue
    volumes:
      - ../services/TODO-core:/app
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-beat:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-beat
    command: poetry run celery -A settings.celery beat -l info
    volumes:
      - ../services/TODO-core:/app
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-db:
    image: mongo:7.0
    container_name: analytics-db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - analytics_mongo_data:/data/db
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: |
        mongosh --host localhost:27017 --eval 'quit(db.runCommand({ ping: 1 }).ok ? 0 : 1)'
      interval: 10s
      timeout: 5s
      retries: 10

  analytics-api:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-api
    command: poetry run uvicorn main:app --host 0.0.0.0 --port 8002
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-worker:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-worker
    environment:
      PYTHONPATH: /app:/app/../services
    command: poetry run celery -A tasks worker --loglevel=info -Q analytics_queue
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-kafka-consumer:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-kafka-consumer
    environment:
      PYTHONPATH: /app:/app/../services
    command: poetry run python kafka_consumer_runner.py
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-beat:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-beat
    environment:
      PYTHONPATH: /app:/app/../services
    command: poetry run celery -A tasks beat -l info
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  files-api:
    build:
      context: ../services/files
      dockerfile: Dockerfile
    container_name: files-api
    environment:
      PYTHONPATH: /app:/app/../services
    command: >
      sh -c "poetry run alembic upgrade heads &&
             poetry run uvicorn main:app --host 0.0.0.0 --port 8003"
    volumes:
      - ../services/files:/app
    env_file:
      - ../services/files/.env
    depends_on:
      files-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend-net:
    driver: bridge

volumes:
  auth_postgres_data:
  todo_postgres_data:
  redis_data:
  static_volume:
  analytics_mongo_data:
  files_postgres_data:
  minio_data:
  zookeeper_data:
  kafka_data:
