services:
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - auth_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTH_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AUTH_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  todo-db:
    image: postgres:15-alpine
    container_name: todo-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - todo_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${TODO_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-api
    command: >
      sh -c "alembic upgrade heads &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ../services/authentication:/app
    ports:
      - "8001:8000"
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  auth-worker:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-worker
    command: celery -A tasks worker --loglevel=info
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-api:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-api
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../services/TODO-core:/app
    ports:
      - "8002:8000"
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge

volumes:
  auth_postgres_data:
  todo_postgres_data:
  redis_data:
