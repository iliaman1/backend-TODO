services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      auth-api:
        condition: service_healthy
      todo-api:
        condition: service_healthy
      files-api:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    networks:
      - backend-net

  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    env_file:
      - ./.env
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-I", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - backend-net
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qo'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-api
    command: >
      sh -c "poetry run alembic upgrade heads &&
             poetry run uvicorn main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-worker:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-worker
    command: poetry run celery -A tasks worker --loglevel=info -Q auth_queue
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-api:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-api
    command: >
      sh -c "poetry run python manage.py collectstatic --noinput &&
             chown -R 101:101 /app/staticfiles &&
             poetry run python manage.py migrate &&
             poetry run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../services/TODO-core:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  todo-worker:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-worker
    command: poetry run celery -A settings.celery worker --loglevel=info -Q todo_queue
    volumes:
      - ../services/TODO-core:/app
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-beat:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-beat
    command: poetry run celery -A settings.celery beat -l info
    volumes:
      - ../services/TODO-core:/app
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-db:
    image: mongo:7.0
    container_name: analytics-db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    env_file:
      - ./.env
    volumes:
      - analytics_mongo_data:/data/db
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--host", "localhost:27017", "--eval", "db.runCommand({ ping: 1 }).ok ? quit(0) : quit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10

  analytics-api:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-api
    command: poetry run uvicorn main:app --host 0.0.0.0 --port 8002
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-worker:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-worker
    command: poetry run celery -A tasks worker --loglevel=info -Q analytics_queue
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-kafka-consumer:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-kafka-consumer
    command: poetry run python kafka_consumer_runner.py
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  analytics-beat:
    build:
      context: ../services/analytics
      dockerfile: Dockerfile
    container_name: analytics-beat
    command: poetry run celery -A tasks beat -l info
    volumes:
      - ../services/analytics:/app
    env_file:
      - ../services/analytics/.env
    depends_on:
      analytics-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  files-api:
    build:
      context: ../services/files
      dockerfile: Dockerfile
    container_name: files-api
    command: >
      sh -c "poetry run alembic upgrade heads &&
             poetry run uvicorn main:app --host 0.0.0.0 --port 8003"
    volumes:
      - ../services/files:/app
    env_file:
      - ../services/files/.env
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  analytics_mongo_data:
  minio_data:
  kafka_data:
