services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      auth-api:
        condition: service_healthy
      todo-api:
        condition: service_healthy
    networks:
      - backend-net

  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - auth_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${AUTH_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AUTH_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  todo-db:
    image: postgres:15-alpine
    container_name: todo-db
    volumes:
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - todo_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${TODO_DB_NAME}
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-api:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-api
    command: >
      sh -c "poetry run alembic upgrade heads &&
             poetry run uvicorn main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-worker:
    build:
      context: ../services/authentication
      dockerfile: Dockerfile
    container_name: auth-worker
    command: poetry run celery -A tasks worker --loglevel=info
    volumes:
      - ../services/authentication:/app
    env_file:
      - ../services/authentication/.env
    depends_on:
      auth-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

  todo-api:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-api
    command: >
      sh -c "poetry run python manage.py collectstatic --noinput &&
             chown -R 101:101 /app/staticfiles &&
             poetry run python manage.py migrate &&
             poetry run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../services/TODO-core:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-db:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

  todo-worker:
    build:
      context: ../services/TODO-core
      dockerfile: Dockerfile
    container_name: todo-worker
    command: poetry run celery -A settings.celery worker --loglevel=info
    volumes:
      - ../services/TODO-core:/app
    env_file:
      - ../services/TODO-core/.env
    depends_on:
      todo-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge

volumes:
  auth_postgres_data:
  todo_postgres_data:
  redis_data:
  static_volume:
