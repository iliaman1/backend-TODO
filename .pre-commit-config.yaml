repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  # Общие для всех Python-сервисов
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: black (all Python)
        types: [python]
        exclude: |
          (?x)^(
            services/.*/migrations/|  # Игнорировать миграции
            .venv/|__pycache__/
          )

  # Индивидуальные настройки для сервисов
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (authentication)
        files: ^services/authentication/
        args: ["--profile", "black"]
      - id: isort
        name: isort (TODO-core)
        files: ^services/TODO-core/
        args: ["--profile", "black"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (authentication)
        files: ^services/authentication/
        args: ["--max-line-length=120", "--ignore=B008"]
        additional_dependencies: ["flake8-bugbear==24.2.6"]
        exclude: |
          (?x)^(
            services/authentication/migrations/
          )
